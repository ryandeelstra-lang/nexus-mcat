# charged_up MCAT taxonomy — the frozen coverage spine (Decision 22).
# Source: AAMC, "What's on the MCAT Exam?" (© 2020 Association of American Medical Colleges).
#   https://students-residents.aamc.org/prepare-mcat-exam/whats-mcat-exam-pdf-outline
# Verbatim AAMC content-category + Foundational-Concept titles; CARS = 3 reasoning skills.
#
# Coverage denominators (Decision 22): the readiness GATE divides by the 31 AAMC content
# categories (is_content_category: true); the displayed coverage MAP divides by all 34 leaves
# (31 content categories + 3 CARS reasoning-skill leaves). FC10 has exactly ONE category (10A).
version: 1
source: "AAMC — What's on the MCAT Exam? (© 2020 AAMC)"
source_url: "https://students-residents.aamc.org/prepare-mcat-exam/whats-mcat-exam-pdf-outline"

sections:
  - abbrev: "C-P"
    name: "Chemical and Physical Foundations of Biological Systems"
  - abbrev: "CARS"
    name: "Critical Analysis and Reasoning Skills"
  - abbrev: "B-B"
    name: "Biological and Biochemical Foundations of Living Systems"
  - abbrev: "P-S"
    name: "Psychological, Social, and Biological Foundations of Behavior"

foundational_concepts:
  - { id: "FC1", section: "B-B", statement: "Biomolecules have unique properties that determine how they contribute to the structure and function of cells and how they participate in the processes necessary to maintain life." }
  - { id: "FC2", section: "B-B", statement: "Highly organized assemblies of molecules, cells, and organs interact to carry out the functions of living organisms." }
  - { id: "FC3", section: "B-B", statement: "Complex systems of tissues and organs sense the internal and external environments of multicellular organisms, and through integrated functioning, maintain a stable internal environment within an ever-changing external environment." }
  - { id: "FC4", section: "C-P", statement: "Complex living organisms transport materials, sense their environment, process signals, and respond to changes using processes understood in terms of physical principles." }
  - { id: "FC5", section: "C-P", statement: "The principles that govern chemical interactions and reactions form the basis for a broader understanding of the molecular dynamics of living systems." }
  - { id: "FC6", section: "P-S", statement: "Biological, psychological, and sociocultural factors influence the ways that individuals perceive, think about, and react to the world." }
  - { id: "FC7", section: "P-S", statement: "Biological, psychological, and sociocultural factors influence behavior and behavior change." }
  - { id: "FC8", section: "P-S", statement: "Psychological, sociocultural, and biological factors influence the way we think about ourselves and others, as well as how we interact with others." }
  - { id: "FC9", section: "P-S", statement: "Cultural and social differences influence well-being." }
  - { id: "FC10", section: "P-S", statement: "Social stratification and access to resources influence well-being." }


  - { src: "CARS.FOC.T01", dst: "CARS.FOC.T07", rationale: "Word choice is the basis for rhetorical inference", confidence: "medium" }
  - { src: "CARS.FOC.T02", dst: "CARS.FOC.T06", rationale: "Must parse sentences to locate key details", confidence: "high" }
  - { src: "CARS.FOC.T02", dst: "CARS.FOC.T05", rationale: "Sentence comprehension enables seeing text structure", confidence: "medium" }
  - { src: "CARS.FOC.T05", dst: "CARS.FOC.T03", rationale: "Structure and hierarchy reveal the main idea", confidence: "high" }
  - { src: "CARS.FOC.T06", dst: "CARS.FOC.T03", rationale: "Key details support identifying the thesis", confidence: "medium" }
  - { src: "CARS.FOC.T03", dst: "CARS.FOC.T04", rationale: "Grasping the main idea precedes reading tone", confidence: "high" }
  - { src: "CARS.FOC.T07", dst: "CARS.FOC.T04", rationale: "Rhetorical inference informs author tone/attitude", confidence: "medium" }

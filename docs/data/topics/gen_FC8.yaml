          - { id: "PS.8A.T04.S02", name: "In-Group Favoritism and Self-Esteem" }
      - id: "PS.8A.T05"
        name: "Influence of Individuals on Identity Formation"
        subtopics:
          - { id: "PS.8A.T05.S01", name: "Cooley's Looking-Glass Self" }
          - { id: "PS.8A.T05.S02", name: "Imitation and Role-Taking" }
          - { id: "PS.8A.T05.S03", name: "Mead's I and Me" }
          - { id: "PS.8A.T05.S04", name: "Mead's Generalized Other" }

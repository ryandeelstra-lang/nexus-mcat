# Topic layer for Foundational Concept FC8 (P-S) — Content Categories PS.8A "Self-identity",
# PS.8B "Social thinking", PS.8C "Social interactions".
# Grounded in AAMC "What's on the MCAT Exam?" content outline (© 2020 AAMC).
# 2-level scheme (topic -> subtopic): every AAMC outline leaf preserved as a subtopic; the
# outline's ▪-level clusters promoted to sibling topics. Ordered foundational-first
# (self-concept -> identity formation; attribution -> stereotype -> prejudice; status -> role -> group).
# Discrimination lives only in 8C per the outline; prejudice (8B) is its within-FC prerequisite.
fc: "FC8"
section: "P-S"
categories:
  - id: "PS.8A"
    name: "Self-identity"
    topics:
      - id: "PS.8A.T01"
        name: "Self-Concept and Self-Identity"
        subtopics:
          - { id: "PS.8A.T01.S01", name: "Self-Concept" }
          - { id: "PS.8A.T01.S02", name: "Self-Identity" }
          - { id: "PS.8A.T01.S03", name: "Self-Schema" }
          - { id: "PS.8A.T01.S04", name: "Identity Salience and Hierarchy" }
      - id: "PS.8A.T02"
        name: "Self-Esteem, Self-Efficacy, and Locus of Control"
        subtopics:
          - { id: "PS.8A.T02.S01", name: "Self-Esteem" }
          - { id: "PS.8A.T02.S02", name: "Self-Efficacy" }
          - { id: "PS.8A.T02.S03", name: "Locus of Control" }
      - id: "PS.8A.T03"

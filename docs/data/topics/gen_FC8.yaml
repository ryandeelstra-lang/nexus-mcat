          - { id: "PS.8A.T06.S03", name: "Cultural Influence on Identity" }
      - id: "PS.8A.T07"
        name: "Theories of Identity Development"
        subtopics:
          - { id: "PS.8A.T07.S01", name: "Freud's Psychosexual Development" }
          - { id: "PS.8A.T07.S02", name: "Erikson's Psychosocial Development" }
          - { id: "PS.8A.T07.S03", name: "Kohlberg's Moral Development" }
          - { id: "PS.8A.T07.S04", name: "Gilligan's Care-Based Moral Reasoning" }
          - { id: "PS.8A.T07.S05", name: "Vygotsky's Sociocultural Development" }
  - id: "PS.8B"
    name: "Social thinking"

          - { id: "PS.8B.T06.S02", name: "Role of Emotion in Prejudice" }
          - { id: "PS.8B.T06.S03", name: "Role of Cognition in Prejudice" }
          - { id: "PS.8B.T06.S04", name: "Power, Prestige, and Class in Prejudice" }
          - { id: "PS.8B.T06.S05", name: "Stigma" }
      - id: "PS.8B.T07"
        name: "Ethnocentrism and Cultural Relativism"
        subtopics:
          - { id: "PS.8B.T07.S01", name: "Ethnocentrism" }
          - { id: "PS.8B.T07.S02", name: "Cultural Relativism" }
  - id: "PS.8C"
    name: "Social interactions"
    topics:
      - id: "PS.8C.T01"
        name: "Status"
        subtopics:
          - { id: "PS.8C.T01.S01", name: "Ascribed Status" }
          - { id: "PS.8C.T01.S02", name: "Achieved Status" }

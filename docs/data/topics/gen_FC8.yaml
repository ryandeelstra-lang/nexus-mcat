          - { id: "PS.8A.T03.S03", name: "Age Identity" }
          - { id: "PS.8A.T03.S04", name: "Sexual Orientation Identity" }
          - { id: "PS.8A.T03.S05", name: "Class Identity" }
      - id: "PS.8A.T04"

prerequisites:
  # 8A — self-concept is the atom the rest of self-identity builds on
  - { src: "PS.8A.T01", dst: "PS.8A.T02", rationale: "Self-concept precedes evaluating self-esteem and efficacy", confidence: "high" }
  - { src: "PS.8A.T01", dst: "PS.8A.T03", rationale: "Self-identity framing precedes specific identity types", confidence: "high" }
  - { src: "PS.8A.T01", dst: "PS.8A.T04", rationale: "Self-concept underlies personal vs social identity", confidence: "high" }
  - { src: "PS.8A.T01", dst: "PS.8A.T05", rationale: "Must grasp self-concept before theories of its formation", confidence: "high" }
  - { src: "PS.8A.T01", dst: "PS.8A.T07", rationale: "Self-identity framing precedes developmental theories", confidence: "medium" }
  - { src: "PS.8A.T03", dst: "PS.8A.T04", rationale: "Race, gender, class identities are bases of social identity", confidence: "medium" }
  - { src: "PS.8A.T05", dst: "PS.8A.T06", rationale: "Individual influences precede group and cultural ones", confidence: "medium" }
  - { src: "PS.8A.T04.S01", dst: "PS.8A.T04.S02", rationale: "Personal vs social identity precedes in-group favoritism", confidence: "high" }
  - { src: "PS.8A.T07.S01", dst: "PS.8A.T07.S02", rationale: "Erikson extended Freud's stages psychosocially", confidence: "high" }
  - { src: "PS.8A.T07.S03", dst: "PS.8A.T07.S04", rationale: "Gilligan critiqued and built on Kohlberg's model", confidence: "high" }
  # 8B — attribution -> biases; stereotype (cognitive) -> prejudice (affective)
  - { src: "PS.8B.T01", dst: "PS.8B.T02", rationale: "Normative attribution precedes systematic attribution errors", confidence: "high" }
  - { src: "PS.8B.T01", dst: "PS.8B.T03", rationale: "Attribution shapes how we perceive other people", confidence: "medium" }
  - { src: "PS.8B.T04", dst: "PS.8B.T05", rationale: "Stereotype concept precedes stereotype-driven processes", confidence: "high" }
  - { src: "PS.8B.T04", dst: "PS.8B.T06", rationale: "Stereotypes (cognitive) underlie prejudice (affective)", confidence: "high" }
  - { src: "PS.8B.T06", dst: "PS.8B.T07", rationale: "Prejudice underlies ethnocentric in-group bias", confidence: "medium" }
  # 8C — status carries roles; groups precede organizations; behavior precedes its biology
  - { src: "PS.8C.T01", dst: "PS.8C.T02", rationale: "Statuses carry the roles people enact", confidence: "high" }
  - { src: "PS.8C.T03", dst: "PS.8C.T04", rationale: "Organizations are large formal groups", confidence: "high" }
  - { src: "PS.8C.T05", dst: "PS.8C.T06", rationale: "Communication underlies emotional expression and detection", confidence: "medium" }
  - { src: "PS.8C.T06", dst: "PS.8C.T07", rationale: "Managing emotional display underlies self-presentation", confidence: "medium" }
  - { src: "PS.8C.T08", dst: "PS.8C.T09", rationale: "Define social behaviors before their biological explanations", confidence: "high" }
  - { src: "PS.8C.T08.S04", dst: "PS.8C.T09.S04", rationale: "Altruism concept precedes inclusive-fitness explanation", confidence: "high" }
  # Cross-category within FC8
  - { src: "PS.8B.T06", dst: "PS.8C.T10", rationale: "Prejudice (attitude) precedes discrimination (behavior)", confidence: "high" }
  - { src: "PS.8A.T04", dst: "PS.8B.T07", rationale: "Social identity and in-group bias underlie ethnocentrism", confidence: "medium" }
cross_prerequisites:
  # FC8 depends on FC7 attitudes and FC6 cognition/emotion. Far end = hint; owned end = exact FC8 id.
  - { src_hint: "PS.7A: Attitudes", dst: "PS.8B.T06", rationale: "Prejudice is a negative attitude toward a group", confidence: "high" }
  - { src_hint: "PS.7A: Attitudes", dst: "PS.8B.T07", rationale: "Ethnocentrism is an attitude favoring one's own culture", confidence: "medium" }
  - { src_hint: "PS.6B: Cognition", dst: "PS.8B.T01", rationale: "Attribution is causal cognition about behavior", confidence: "high" }
  - { src_hint: "PS.6B: Cognition", dst: "PS.8B.T04", rationale: "Stereotypes are schemas applied to social groups", confidence: "high" }
  - { src_hint: "PS.6B: Cognition", dst: "PS.8A.T01", rationale: "Self-schema is a cognitive structure about the self", confidence: "medium" }
  - { src_hint: "PS.6C: Emotion", dst: "PS.8C.T06", rationale: "Understanding emotion precedes its expression and detection", confidence: "high" }
related:
  - { a: "PS.8A.T04", b: "PS.8C.T03", rationale: "Social identity drives in-group/out-group group dynamics" }
  - { a: "PS.8A.T02", b: "PS.8B.T02", rationale: "Self-serving bias protects self-esteem" }
  - { a: "PS.8A.T05", b: "PS.8C.T07", rationale: "Looking-glass self parallels impression management" }
  - { a: "PS.8C.T08.S01", b: "PS.8C.T08.S03", rationale: "Attraction and attachment shape close relationships" }

# XcodeGen spec for the ChargedUp iOS companion. Generate the .xcodeproj with:
#   brew install xcodegen && (cd ios/ChargedUp && xcodegen generate)
# (The generated ChargedUp.xcodeproj is a build artifact — reproducible from this file.)
name: ChargedUp
options:
  bundleIdPrefix: app.chargedup
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: "1.28.0"

targets:
  ChargedUp:
    type: application
    platform: iOS
    sources:
      - path: ChargedUp
    dependencies:
      # The shared Rust engine, as a static-library XCFramework (built by
      # scripts/build_xcframework.sh). Not embedded (static), linked in.
      - framework: ../AnkiEngine.xcframework
        embed: false
      - package: SwiftProtobuf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.chargedup.ChargedUp
        INFOPLIST_FILE: ChargedUp/Info.plist
        SWIFT_VERSION: "5.9"
        # The staticlib exports plain C symbols; -ObjC keeps them at link time.
        OTHER_LDFLAGS: -ObjC
        TARGETED_DEVICE_FAMILY: "1,2"
        # AnkiEngine.xcframework ships an arm64-only simulator slice
        # (ios-arm64-simulator). Drop the legacy x86_64 simulator arch so a
        # generic-simulator build links against the arm64 staticlib instead of
        # failing with "undefined symbols for architecture x86_64".
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
